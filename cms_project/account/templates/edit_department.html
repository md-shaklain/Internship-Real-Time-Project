{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Department</title>
    <link rel="stylesheet" href="{% static 'css/edit_department.css' %}">
</head>
<body>

<div class="page-wrapper">
    <div class="form-card">
        <h2>Edit Department</h2>

        <form method="POST">
            {% csrf_token %}

            <label for="name">Department Name</label>
            <input type="text" id="name" name="name" value="{{ department.name }}" required>

            <button type="submit" class="update-btn">Update Department</button>
            <a href="{% url 'departments_list' %}" class="back-btn">← Back</a>
        </form>
    </div>
</div>

</body>
</html>
