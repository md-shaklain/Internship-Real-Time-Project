{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Add Student</title>
    <link rel="stylesheet" href="{% static 'css/add_student.css' %}">
</head>

<body>

<div class="container">

<h2>Add Student</h2>

<form method="POST">
{% csrf_token %}

<label>Name</label>
<input type="text" name="name" placeholder="Enter Name">

<label>Email</label>
<input type="email" name="email" placeholder="Enter Email">

<label>Phone</label>
<input type="text" name="phone" placeholder="Enter Phone">

<label>Department</label>
<select name="department">
<option>Select Department</option>
{% for department in departments %}
<option value="{{ department.id }}">{{ department.name }}</option>
{% endfor %}
</select>

<label>Course</label>
<select name="course">
<option>Select Course</option>
{% for course in courses %}
<option value="{{ course.id }}">{{ course.name }}</option>
{% endfor %}
</select>

<label>Semester</label>
<input type="text" name="semester" placeholder="Enter Semester">

<label>Enrollment No</label>
<input type="text" name="enrollment_no" placeholder="Enter Enrollment Number">

<button type="submit" class="add-btn">Add Student</button>

<!-- Back Button -->
<a href="{% url 'student_list' %}" class="back-btn">← Back</a>

</form>

</div>

</body>
</html>
