{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher List</title>
    <link rel="stylesheet" href="{% static 'css/teacher_list.css' %}">
</head>
<body>

<div class="container">
    <h2>Teacher List</h2>

    <div class="top-buttons">
        <a href="{% url 'add_teacher' %}" class="add-btn">Add Teacher</a>
        <a href="{% url 'admin_dashboard' %}" class="back-btn">Back to Dashboard</a>
    </div>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Department</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody>
            {% for teacher in teachers %}
            <tr>
                <td>{{ teacher.id }}</td>
                <td>{{ teacher.name }}</td>
                <td>{{ teacher.email }}</td>
                <td>{{ teacher.department.name }}</td>
                <td>
                    <a href="{% url 'edit_teacher' teacher.id %}" class="edit-btn">Edit</a>
                    <a href="{% url 'delete_teacher' teacher.id %}" class="delete-btn" onclick="return confirm('Are you sure you want to delete this teacher?')">Delete</a>
                </td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="5" class="no-data">No teachers found.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

</body>
</html>
