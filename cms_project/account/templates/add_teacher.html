{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Teacher</title>
    <link rel="stylesheet" href="{% static 'css/add_teacher.css' %}">
</head>
<body>

<div class="container">
    <h2>Add Teacher</h2>

    <form method="POST">
        {% csrf_token %}

        <label>Name</label>
        <input type="text" name="name" placeholder="Enter teacher name" required>

        <label>Email</label>
        <input type="email" name="email" placeholder="Enter teacher email" required>

        <label>Department</label>
        <select name="department" required>
            <option value="">Select Department</option>
            {% for department in departments %}
            <option value="{{ department.id }}">{{ department.name }}</option>
            {% endfor %}
        </select>

        <label>User Account</label>
        <select name="useraccount" required>
            <option value="">Select Teacher Login Account</option>
            {% for user in users %}
            <option value="{{ user.id }}">{{ user.username }}</option>
            {% endfor %}
        </select>

        <button type="submit" class="add-btn">Add Teacher</button>

        <a href="{% url 'teacher_list' %}" class="back-btn">← Back</a>
    </form>
</div>

</body>
</html>
