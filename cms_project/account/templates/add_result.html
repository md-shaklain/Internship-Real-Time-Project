{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Student Result</title>
    <link rel="stylesheet" href="{% static 'css/add_result.css' %}">
</head>
<body>

<div class="form-container">
    <h2>Add Student Result</h2>

    {% if error %}
        <p class="error-msg">{{ error }}</p>
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <label for="student">Select Student</label>
        <select name="student" id="student" required>
            <option value="">Select Student</option>
            {% for student in students %}
                <option value="{{ student.id }}">{{ student.name }}</option>
            {% endfor %}
        </select>

        <label for="course">Select Course</label>
        <select name="course" id="course" required>
            <option value="">Select Course</option>
            {% for course in courses %}
                <option value="{{ course.id }}">{{ course.name }}</option>
            {% endfor %}
        </select>

        <label for="subject">Select Subject</label>
        <select name="subject" id="subject" required>
            <option value="">Select Subject</option>
            <option value="Data Structures">Data Structures</option>
            <option value="DBMS">DBMS</option>
            <option value="Operating System">Operating System</option>
            <option value="Computer Networks">Computer Networks</option>
            <option value="Software Engineering">Software Engineering</option>
            <option value="Python Programming">Python Programming</option>
            <option value="Java">Java</option>
            <option value="Artificial Intelligence">Artificial Intelligence</option>
        </select>

        <label for="marks">Marks</label>
        <input type="number" name="marks" id="marks" placeholder="Enter marks" required>

        <label for="grade">Select Grade</label>
        <select name="grade" id="grade" required>
            <option value="">Select Grade</option>
            <option value="A">A</option>
            <option value="B">B</option>
            <option value="C">C</option>
            <option value="Fail">Fail</option>
        </select>

        <button type="submit" class="submit-btn">Add Result</button>
    </form>

    <a href="{% url 'result_list' %}" class="back-link">← Back to Result List</a>
</div>

</body>
</html>
