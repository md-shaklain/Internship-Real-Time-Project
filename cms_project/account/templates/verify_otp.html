{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Verify OTP</title>
    <link rel="stylesheet" href="{% static 'css/verify_otp.css' %}">
</head>
<body>

<div class="container">
    <h2>Verify OTP</h2>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        <input type="text" name="otp" placeholder="Enter 6 digit OTP" maxlength="6" required>
        <button type="submit">Verify OTP</button>
    </form>
</div>

</body>
</html>
