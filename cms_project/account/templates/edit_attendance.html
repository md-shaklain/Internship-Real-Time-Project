{% load static %}

<!DOCTYPE html>
<html>
<head>
    <title>Edit Attendance</title>
    <link rel="stylesheet" href="{% static 'css/edit_attendance.css' %}">
</head>
<body>

<div class="container">
    <h2>Edit Attendance</h2>

    <form method="POST">
        {% csrf_token %}

        <label>Student</label>
        <input type="text" value="{{ attendance.student.name }}" readonly>

        <label>Date</label>
        <input type="date" name="date" value="{{ attendance.date|date:'Y-m-d' }}" required>

        <label>Status</label>
        <select name="status" required>
            <option value="Present" {% if attendance.status == "Present" %}selected{% endif %}>Present</option>
            <option value="Absent" {% if attendance.status == "Absent" %}selected{% endif %}>Absent</option>
        </select>

        <button type="submit">Update Attendance</button>
    </form>

    <a href="{% url 'attendance_list' %}" class="back-btn">Back</a>
</div>

</body>
</html>
