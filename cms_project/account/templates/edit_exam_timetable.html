{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Exam Time Table</title>
    <link rel="stylesheet" href="{% static 'css/add_exam_timetable.css' %}">
</head>
<body>

<div class="form-container">
    <div class="form-box">
        <h2>Edit Exam Time Table</h2>

        <form method="POST">
            {% csrf_token %}

            <div class="form-group">
                <label for="course">Course</label>
                <select name="course" id="course" required>
                    {% for course in courses %}
                        <option value="{{ course.id }}" {% if course.id == exam.course.id %}selected{% endif %}>
                            {{ course.name }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label for="exam_date">Exam Date</label>
                <input type="date" name="exam_date" id="exam_date" value="{{ exam.exam_date|date:'Y-m-d' }}" required>
            </div>

            <div class="form-group">
                <label for="timing">Timing</label>
                <select name="timing" id="timing" required>
                    <option value="09:00 AM - 12:00 PM" {% if exam.timing == "09:00 AM - 12:00 PM" %}selected{% endif %}>09:00 AM - 12:00 PM</option>
                    <option value="10:00 AM - 01:00 PM" {% if exam.timing == "10:00 AM - 01:00 PM" %}selected{% endif %}>10:00 AM - 01:00 PM</option>
                    <option value="11:00 AM - 02:00 PM" {% if exam.timing == "11:00 AM - 02:00 PM" %}selected{% endif %}>11:00 AM - 02:00 PM</option>
                    <option value="02:00 PM - 05:00 PM" {% if exam.timing == "02:00 PM - 05:00 PM" %}selected{% endif %}>02:00 PM - 05:00 PM</option>
                </select>
            </div>

            <div class="form-group">
                <label for="teacher">Exam Teacher</label>
                <select name="teacher" id="teacher" required>
                    {% for teacher in teachers %}
                        <option value="{{ teacher.id }}" {% if teacher.id == exam.teacher.id %}selected{% endif %}>
                            {{ teacher.name }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label for="room_no">Room No</label>
                <input type="text" name="room_no" id="room_no" value="{{ exam.room_no }}" required>
            </div>

            <button type="submit" class="btn-submit">Update Exam</button>

            <a href="{% url 'exam_timetable_list' %}" class="back-link">Back</a>
        </form>
    </div>
</div>

</body>
</html>
