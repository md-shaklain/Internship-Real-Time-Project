{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Attendance List</title>
    <link rel="stylesheet" href="{% static 'css/attendance_list.css' %}">
</head>
<body>

<div class="container">
    <h1>Attendance List</h1>

    <div class="top-buttons">
        <a href="{% url 'add_attendance' %}" class="btn-add">Add Attendance</a>
        <a href="{% url 'admin_dashboard' %}" class="btn-back">Back to Dashboard</a>
    </div>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Student</th>
                <th>Date</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
        </thead>

        <tbody>
            {% for a in attendance %}
            <tr>
                <td>{{ a.id }}</td>
                <td>{{ a.student.name }}</td>
                <td>{{ a.date }}</td>
                <td class="status">{{ a.status }}</td>
                <td>
                    <a href="{% url 'edit_attendance' a.id %}" class="btn-edit">Edit</a>
                    <a href="{% url 'delete_attendance' a.id %}" class="btn-delete"
                       onclick="return confirm('Are you sure you want to delete this attendance?')">
                       Delete
                    </a>
                </td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="5">No attendance records found.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

</body>
</html>
