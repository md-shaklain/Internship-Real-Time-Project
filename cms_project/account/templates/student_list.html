{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Student List</title>
    <link rel="stylesheet" href="{% static 'css/student_list.css' %}">
</head>
<body>

<center><h2>Student List</h2></center>

<div style="margin-bottom: 20px;">
    <a href="{% url 'add_student' %}" style="padding:10px 18px; background:green; color:white; text-decoration:none; border-radius:5px;">Add Student</a>

    <a href="{% url 'admin_dashboard' %}" style="padding:10px 18px; background:#007bff; color:white; text-decoration:none; border-radius:5px; margin-left:10px;">Back to Dashboard</a>
</div>

<table border="1" cellpadding="10" cellspacing="0" width="100%">
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Email</th>
        <th>Course</th>
        <th>Action</th>
    </tr>

    {% for student in students %}
    <tr>
        <td>{{ forloop.counter }}</td>
        <td>{{ student.name }}</td>
        <td>{{ student.email }}</td>
        <td>{{ student.course.name }}</td>
        <td>
            <a href="{% url 'edit_student' student.id %}">Edit</a> |
            <a href="{% url 'delete_student' student.id %}">Delete</a>
        </td>
    </tr>
    {% empty %}
    <tr>
        <td colspan="5">No students found</td>
    </tr>
    {% endfor %}
</table>

</body>
</html>
