{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Add Department</title>
    <link rel="stylesheet" href="{% static 'css/add_department.css' %}">
</head>

<body>

<div class="container">

    <h2>Add Department</h2>

    <form method="POST">
        {% csrf_token %}

        <label>Department Name</label>
        <input type="text" name="name" placeholder="Enter Department Name">

        <button type="submit" class="add-btn">Add Department</button>

        <!-- Back Button -->
        <a href="{% url 'departments_list' %}" class="back-btn">← Back</a>

    </form>

</div>

</body>
</html>
