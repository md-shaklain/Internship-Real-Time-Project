{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Course List</title>
    <link rel="stylesheet" href="{% static 'css/course_list.css' %}">
</head>
<body>

<div class="container">
    <h2>Course List</h2>

    <div class="button-group">
        <a href="{% url 'add_course' %}" class="btn add-btn">Add Course</a>
        <a href="{% url 'admin_dashboard' %}" class="btn back-btn">Back to Dashboard</a>
    </div>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Course Name</th>
                <th>Department</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            {% for course in courses %}
            <tr>
                <td>{{ forloop.counter }}</td>
                <td>{{ course.name }}</td>
                <td>{{ course.department.name }}</td>
                <td>
                    <a href="{% url 'edit_course' course.id %}" class="action-btn edit-btn">Edit</a>
                    <a href="{% url 'delete_course' course.id %}" class="action-btn delete-btn">Delete</a>
                </td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="4">No courses found</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

</body>
</html>
